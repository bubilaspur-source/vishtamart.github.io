// SIGNUP
window.signup = function(){

// LOGIN

  .then(()=> alert("Login success"))
  .catch(err=> alert(err.message));
}

// ADD PRODUCT
window.addProduct = async function(){
  await addDoc(collection(db,"products"),{
    name:pname.value,
    price:pprice.value
  });
}

// LOAD PRODUCTS
function loadProducts(){
  onSnapshot(collection(db,"products"), snap=>{
    products.innerHTML="";
    snap.forEach(doc=>{
      let p=doc.data();
      products.innerHTML += `
      <div class="box">
        ${p.name} - ₹${p.price}
      </div>`;
    });
  });
}
