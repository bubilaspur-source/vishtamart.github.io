<!DOCTYPE html>
<html>
<head>
<title>VishtaMart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;text-align:center;background:#f4f4f4}
.box{background:#fff;padding:20px;margin:10px;border-radius:10px}
button{padding:10px;background:green;color:white;border:none}
input{padding:8px;margin:5px}
</style>
</head>

<body>

<h1>🛒 VishtaMart</h1>

<div id="loginBox" class="box">
<h3>Login / Signup</h3>
<input id="email" type="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<div id="shop" style="display:none">
<h2>Products</h2>
<div id="products"></div>
</div>

<div id="admin" style="display:none" class="box">
<h3>Admin Panel</h3>
<input id="pname" placeholder="Product name">
<input id="pprice" placeholder="Price">
<button onclick="addProduct()">Add Product</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8XjcB3fnxKWpSLJPhoZB-y3EKaPGXj6g",
  authDomain: "vishtamart-5c50f.firebaseapp.com",
  projectId: "vishtamart-5c50f",
  storageBucket: "vishtamart-5c50f.firebasestorage.app",
  messagingSenderId: "299255313794",
  appId: "1:299255313794:web:1e0bb6c5fd158ff6f14b9b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔥 AUTO-FILL TEMP CREDENTIALS
window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("email").value = "test123@gmail.com";
  document.getElementById("password").value = "123456";
});

// SIGNUP
window.signup = function(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Enter email and password properly");
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
  .then(()=> alert("Signup success"))
  .catch(err=> alert(err.message));
}

// LOGIN
window.login = function(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(()=> alert("Login success"))
  .catch(err=> alert(err.message));
}

// AUTH STATE
onAuthStateChanged(auth, user=>{
  if(user){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("shop").style.display="block";

    // 🔹 Show Admin panel only for admin@gmail.com
    if(user.email === "admin@gmail.com"){
      document.getElementById("admin").style.display="block";
    }

    loadProducts();
  }
});

// ADD PRODUCT
window.addProduct = async function(){
  const name = document.getElementById("pname").value.trim();
  const price = document.getElementById("pprice").value.trim();

  if(!name || !price){
    alert("Enter product name and price");
    return;
  }

  await addDoc(collection(db,"products"),{
    name:name,
    price:price
  });

  alert("Product Added");
  document.getElementById("pname").value = "";
  document.getElementById("pprice").value = "";
}

// LOAD PRODUCTS (Live)
function loadProducts(){
  onSnapshot(collection(db,"products"), snap=>{
    const productsDiv = document.getElementById("products");
    productsDiv.innerHTML="";
    snap.forEach(doc=>{
      const p = doc.data();
      productsDiv.innerHTML += `
      <div class="box">
        ${p.name} - ₹${p.price}
      </div>`;
    });
  });
}
</script>

</body>
</html>
