<!DOCTYPE html>
<html>
<head>
  <title>VishtaMart - Online Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background:#f4f4f4;
      text-align:center;
    }
    h1 {
      background:#222;
      color:white;
      padding:15px;
    }
    .product {
      background:white;
      padding:15px;
      margin:10px;
      border-radius:10px;
      box-shadow:0 0 5px gray;
      display:inline-block;
      width:250px;
    }
    img {
      width:100%;
      height:200px;
      object-fit:cover;
      border-radius:10px;
    }
    button {
      background:green;
      color:white;
      border:none;
      padding:10px;
      margin-top:10px;
      cursor:pointer;
      border-radius:5px;
    }
    #cartBox {
      background:white;
      padding:15px;
      margin:20px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>🛒 VishtaMart</h1>
<h3>Best Products For You</h3>

<div class="product">
  <img src="https://via.placeholder.com/250x200?text=T-Shirt">
  <h3>T-Shirt</h3>
  <p>Price ₹499</p>
  <button onclick="addToCart('T-Shirt',499)">Add to Cart</button>
</div>

<div class="product">
  <img src="https://via.placeholder.com/250x200?text=Shoes">
  <h3>Shoes</h3>
  <p>Price ₹999</p>
  <button onclick="addToCart('Shoes',999)">Add to Cart</button>
</div>

<div class="product">
  <img src="https://via.placeholder.com/250x200?text=Watch">
  <h3>Watch</h3>
  <p>Price ₹799</p>
  <button onclick="addToCart('Watch',799)">Add to Cart</button>
</div>

<div id="cartBox">
  <h2>🛒 Your Cart</h2>
  <ul id="cartList"></ul>
  <h3>Total: ₹<span id="total">0</span></h3>

  <button onclick="orderWhatsApp()">Order on WhatsApp</button>
  <button onclick="payNow()">Pay with UPI</button>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name,price){
  cart.push(name + " - ₹" + price);
  total += price;

  document.getElementById("total").innerText = total;

  let li = document.createElement("li");
  li.innerText = name + " - ₹" + price;
  document.getElementById("cartList").appendChild(li);
}

function orderWhatsApp(){
  let text = "Order Details:%0A";
  cart.forEach(item => {
    text += item + "%0A";
  });
  text += "Total = ₹" + total;

  window.open("https://wa.me/+919340322556?text=" + text);
}

function payNow(){
  alert("Pay using your UPI QR or UPI ID");
}
</script>

</body>
</html>
